<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LiveLayer · template preview harness</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: Inter, system-ui, sans-serif; }
    body { display: flex; flex-direction: column; background: #0b0d12; color: #f8fafc; }
    .bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 10px 14px; background: #11151c; border-bottom: 1px solid #1e2530; }
    .bar strong { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: #94a3b8; margin-right: 6px; }
    button { font: inherit; font-size: 13px; padding: 8px 14px; border-radius: 8px; border: 1px solid #2a3340; background: #1a212b; color: #e6edf5; cursor: pointer; }
    button:hover { border-color: #3b82f6; }
    button.clear { background: #2a1416; border-color: #5a2327; color: #fecaca; }
    label.toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #cbd5e1; margin-left: 8px; }
    /* Simulated backdrops behind the transparent /output iframe so legibility
       can be judged over "video". The iframe itself stays transparent. */
    .stage { position: relative; flex: 1; overflow: hidden; }
    .stage.bg-camera {
      background:
        radial-gradient(60% 50% at 72% 28%, rgba(255,255,255,0.55), rgba(255,255,255,0) 60%),
        radial-gradient(120% 100% at 28% 30%, #6b7385 0%, #2c313c 55%, #101218 100%); }
    .stage.bg-dark { background: radial-gradient(130% 110% at 50% 20%, #14171d, #0a0c11 60%, #050609); }
    .stage.bg-bright { background: radial-gradient(120% 100% at 50% 24%, #f4f6f9, #d2d6de 58%, #aab0bd); }
    iframe { position: absolute; inset: 0; border: 0; width: 100%; height: 100%; background: transparent; }
  </style>
</head>
<body>
  <div class="bar">
    <strong>Template</strong>
    <button data-t="preacher-lower-third">Lower Third</button>
    <button data-t="scripture-card">Scripture</button>
    <button data-t="announcement-banner">Announcement</button>
    <button class="clear" data-clear>Clear</button>
    <strong style="margin-left:10px">Background</strong>
    <button data-bg="camera">Camera</button>
    <button data-bg="dark">Dark</button>
    <button data-bg="bright">Bright</button>
    <label class="toggle"><input type="checkbox" id="long" /> long / stress content</label>
    <label class="toggle"><input type="checkbox" id="fade" /> fade crossfade</label>
    <label class="toggle"><input type="checkbox" id="debug" /> safe-area guides</label>
  </div>
  <div class="stage bg-camera" id="stage"><iframe id="out" src="/output"></iframe></div>

  <script>
    const channel = new BroadcastChannel('livelayer:graphics');
    const sample = {
      'preacher-lower-third': {
        short: { name: 'Anna Grace', title: 'Lead Pastor', subtitle: 'Grace Harbor Church', logoUrl: '' },
        long:  { name: 'Bartholomew Higginbotham', title: 'Founder & Senior Teaching Pastor', subtitle: 'Cornerstone Family Worship Center', logoUrl: '' }
      },
      'scripture-card': {
        short: { reference: 'Psalm 23:1-2', verseText: 'The Lord is my shepherd; I shall not want. He makes me lie down in green pastures.', translationLabel: 'ESV', themeTitle: 'Scripture' },
        long:  { reference: 'Romans 8:38-39', verseText: 'For I am convinced that neither death nor life, neither angels nor demons, neither the present nor the future, nor any powers, neither height nor depth, nor anything else in all creation, will be able to separate us from the love of God.', translationLabel: 'NIV', themeTitle: 'Sunday Service' }
      },
      'announcement-banner': {
        short: { headline: 'Weekend Service Tonight', body: 'Join us in person or online for worship and a message.', dateTime: 'Sun • 10:30 AM', callToAction: 'Visit the info desk after the service.' },
        long:  { headline: 'Annual Community Thanksgiving Outreach', body: 'Worship, a powerful message, free meals, kids programming, and community updates for the whole family.', dateTime: 'Saturday • 6:30 PM', callToAction: 'RSVP and volunteer at example.com/serve' }
      }
    };

    function show(templateId) {
      const useLong = document.getElementById('long').checked;
      const values = sample[templateId][useLong ? 'long' : 'short'];
      const now = new Date().toISOString();
      const instance = {
        id: 'seed-' + Date.now(),
        templateId,
        values,
        theme: {},            // empty → /output falls back to the registry theme
        durationSeconds: 0,
        createdAt: now,
        updatedAt: now
      };
      // Per-instance override exercises the wired animation path: 'fade' picks
      // the flat crossfade variant, otherwise the registry default (slide build)
      // applies. Full in/out so it survives strict validation everywhere.
      if (document.getElementById('fade').checked) {
        instance.animationOverride = { in: 'fade', out: 'fade' };
      }
      const msg = { id: 'msg-' + Date.now(), type: 'SHOW_GRAPHIC', payload: instance, timestamp: Date.now() };
      localStorage.setItem('livelayer:lastMessage', JSON.stringify(msg));
      channel.postMessage(msg);
    }

    function clear() {
      const msg = { id: 'msg-' + Date.now(), type: 'CLEAR_ALL', payload: {}, timestamp: Date.now() };
      localStorage.removeItem('livelayer:lastMessage');
      channel.postMessage(msg);
    }

    document.querySelectorAll('button[data-t]').forEach((b) =>
      b.addEventListener('click', () => show(b.dataset.t)));
    document.querySelector('[data-clear]').addEventListener('click', clear);
    document.querySelectorAll('button[data-bg]').forEach((b) =>
      b.addEventListener('click', () => {
        document.getElementById('stage').className = 'stage bg-' + b.dataset.bg;
      }));
    document.getElementById('debug').addEventListener('change', (e) => {
      document.getElementById('out').src = '/output' + (e.target.checked ? '?debug=1' : '');
    });
  </script>
</body>
</html>
