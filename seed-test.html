<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LiveLayer · template preview harness</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: Inter, system-ui, sans-serif; }
    body { display: flex; flex-direction: column; background: #0b0d12; color: #f8fafc; }
    .bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 10px 14px; background: #11151c; border-bottom: 1px solid #1e2530; }
    .bar strong { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: #94a3b8; margin-right: 6px; }
    button, select { font: inherit; font-size: 13px; padding: 8px 14px; border-radius: 8px; border: 1px solid #2a3340; background: #1a212b; color: #e6edf5; cursor: pointer; }
    select { padding: 8px 10px; }
    button:hover { border-color: #3b82f6; }
    button.active { border-color: #38bdf8; background: #0f3d5c; color: #f0f9ff; box-shadow: inset 0 0 0 1px rgba(56,189,248,0.22); }
    button.clear { background: #2a1416; border-color: #5a2327; color: #fecaca; }
    button.cycle { background: #132235; border-color: #2b4a70; color: #bfdbfe; }
    label.toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #cbd5e1; margin-left: 8px; }
    /* Simulated backdrops behind the transparent /output iframe so legibility
       can be judged over "video". The iframe itself stays transparent. */
    .stage { position: relative; flex: 1; overflow: hidden; }
    .stage.bg-camera {
      background:
        radial-gradient(60% 50% at 72% 28%, rgba(255,255,255,0.55), rgba(255,255,255,0) 60%),
        radial-gradient(120% 100% at 28% 30%, #6b7385 0%, #2c313c 55%, #101218 100%); }
    .stage.bg-dark { background: radial-gradient(130% 110% at 50% 20%, #14171d, #0a0c11 60%, #050609); }
    .stage.bg-bright { background: radial-gradient(120% 100% at 50% 24%, #f4f6f9, #d2d6de 58%, #aab0bd); }
    iframe { position: absolute; inset: 0; border: 0; width: 100%; height: 100%; background: transparent; }
  </style>
</head>
<body>
  <div class="bar">
    <strong>Template</strong>
    <button data-t="preacher-lower-third">Lower Third</button>
    <button data-t="scripture-card">Scripture</button>
    <button data-t="quote-card">Quote</button>
    <button data-t="announcement-banner">Announcement</button>
    <button data-t="event-banner">Event</button>
    <button data-t="sermon-title">Sermon</button>
    <button data-t="fullscreen-message">Message</button>
    <button class="cycle" data-cycle>Cycle all</button>
    <button class="clear" data-clear>Clear</button>
    <strong style="margin-left:10px">Background</strong>
    <button data-bg="camera">Camera</button>
    <button data-bg="dark">Dark</button>
    <button data-bg="bright">Bright</button>
    <strong style="margin-left:10px">Layout</strong>
    <select id="size" title="Layout size">
      <option value="">Default</option>
      <option value="small">Small</option>
      <option value="medium">Medium</option>
      <option value="large">Large</option>
    </select>
    <strong style="margin-left:10px">Lower Third Style</strong>
    <select id="l3variant" title="Preacher lower-third style">
      <option value="modern-minimal">Modern Minimal</option>
      <option value="angled-accent">Angled Accent</option>
      <option value="signature-medallion">Logo Medallion</option>
      <option value="clean-broadcast">Clean Broadcast</option>
      <option value="bold-plate">Bold Plate</option>
      <option value="split-bar">Split Bar</option>
      <option value="event-style">Event Style</option>
      <option value="subtle-elegance">Subtle Elegance</option>
    </select>
    <strong style="margin-left:10px">Accent</strong>
    <select id="accent" title="Accent (keyline) colour">
      <option value="">Default</option>
      <option value="#22d3ee">Cyan</option>
      <option value="#e8b93c">Gold</option>
      <option value="#f43f5e">Red</option>
    </select>
    <label class="toggle"><input type="checkbox" id="long" /> long / stress content</label>
    <label class="toggle"><input type="checkbox" id="dynamic" /> dynamic date/time</label>
    <label class="toggle"><input type="checkbox" id="fade" /> fade crossfade</label>
    <label class="toggle"><input type="checkbox" id="debug" /> safe-area guides</label>
  </div>
  <div class="stage bg-camera" id="stage"><iframe id="out" src="/output"></iframe></div>

  <script>
    const channel = new BroadcastChannel('livelayer:graphics');
    let paramVariant = null;
    const housePalette = {
      colorBrand: '#0d2095',
      colorAccent: '#1284ff',
      colorSurface: '#07106a',
      colorText: '#ffffff',
      colorSecondary: '#081052'
    };
    const houseGoldPalette = {
      colorBrand: '#0d2095',
      colorAccent: '#E8B93C',
      colorSurface: '#07106a',
      colorText: '#ffffff',
      colorSecondary: '#081052'
    };
    const housePaperPalette = {
      colorBrand: '#0d2095',
      colorAccent: '#ffcf20',
      colorSurface: '#f8fafc',
      colorText: '#07111f',
      colorSecondary: '#07106a'
    };
    const defaultChurchLogoUrl = '/default%20logo.png';
    const sample = {
      'preacher-lower-third': {
        short: { name: 'Rev. Ishamel K. Awotwe', title: 'Lead Pastor', subtitle: 'Mathapoly Church International', logoUrl: defaultChurchLogoUrl, ...houseGoldPalette, colorSurface: '#f8fafc', colorText: '#081052' },
        long:  { name: 'Bartholomew Higginbotham', title: 'Founder & Senior Teaching Pastor', subtitle: 'Cornerstone Family Worship Center', logoUrl: defaultChurchLogoUrl, ...houseGoldPalette, colorSurface: '#f8fafc', colorText: '#081052' }
      },
      'scripture-card': {
        short: { reference: 'Psalm 23:1-2', verseText: 'The Lord is my shepherd; I shall not want. He makes me lie down in green pastures.', translationLabel: 'ESV', themeTitle: 'Scripture', ...housePalette },
        long:  { reference: 'Romans 8:38-39', verseText: 'For I am convinced that neither death nor life, neither angels nor demons, neither the present nor the future, nor any powers, neither height nor depth, nor anything else in all creation, will be able to separate us from the love of God.', translationLabel: 'NIV', themeTitle: 'Sunday Service', ...housePalette }
      },
      'quote-card': {
        short: { quoteText: 'Faith is not the absence of questions; it is the courage to keep walking with God through them.', sourceName: 'Pastor Anna Grace', sourceRole: 'Sunday Message', themeTitle: 'Key Thought', translationLabel: '', ...housePalette },
        long:  { quoteText: 'The church becomes a sign of hope when ordinary people practice extraordinary mercy in ordinary rooms, around ordinary tables, with the patience of Christ.', sourceName: 'Grace Harbor Notes', sourceRole: 'Reflection', themeTitle: 'Reflection', translationLabel: 'Series', ...housePalette }
      },
      'announcement-banner': {
        short: { headline: 'Weekend Service Tonight', body: 'Join us in person or online for worship and a message.', dateTime: 'Sun • 10:30 AM', callToAction: 'Visit the info desk after the service.', ...housePaperPalette },
        long:  { headline: 'Annual Community Thanksgiving Outreach', body: 'Worship, a powerful message, free meals, kids programming, and community updates for the whole family.', dateTime: 'Saturday • 6:30 PM', callToAction: 'RSVP and volunteer at example.com/serve', ...housePaperPalette }
      },
      'event-banner': {
        short: { eventTitle: 'Zonal Music Festival', dateTime: 'Mallam Choir', location: '', callToAction: 'Revitalising our allegiance to God through music.', tag: 'Performing Now', ...housePaperPalette, colorText: '#ffffff', colorSecondary: '#1284ff' },
        long:  { eventTitle: 'Annual Community Thanksgiving Outreach', dateTime: 'Saturday • 6:30 PM', location: 'North Campus Family Center', callToAction: 'Volunteer, bring a guest, and stop by the info desk for details.', tag: 'Next Up', ...housePaperPalette, colorText: '#ffffff', colorSecondary: '#1284ff' }
      },
      'sermon-title': {
        short: { sermonTitle: 'Anchored in Hope', speakerName: 'Pastor Anna Grace', churchName: 'Grace Harbor Church', seriesTitle: 'Summer Psalms', scriptureReference: 'Psalm 23:1-2', date: '{{date}}', ...houseGoldPalette },
        long:  { sermonTitle: 'Learning to Trust God in the Waiting Season', speakerName: 'Pastor Bartholomew Higginbotham', churchName: 'Cornerstone Family Worship Center', seriesTitle: 'Faith for the Long Road', scriptureReference: 'Romans 8:28-39', date: '{{weekday}} · {{date}}', ...houseGoldPalette }
      },
      'fullscreen-message': {
        short: { headline: 'Welcome to Church', body: 'We are glad you are here. Take a moment to greet someone near you.', footerNote: 'Grace Harbor Church', callToAction: 'Service begins at {{time}}', ...houseGoldPalette },
        long:  { headline: 'We Will Be Right Back', body: 'Thank you for joining us online. Stay connected, share the stream, and prepare your heart as service resumes shortly.', footerNote: 'Live from Grace Harbor', callToAction: 'Visit example.com/connect', ...houseGoldPalette }
      }
    };
    const templateIds = Object.keys(sample);
    let cycleTimer = null;

    function markActive(templateId) {
      document.querySelectorAll('button[data-t]').forEach((button) => {
        button.classList.toggle('active', button.dataset.t === templateId);
      });
    }

    function stopCycle() {
      if (cycleTimer) {
        clearInterval(cycleTimer);
        cycleTimer = null;
      }
    }

    function show(templateId) {
      const useLong = document.getElementById('long').checked;
      // Copy so the harness never mutates the shared sample objects.
      const values = { ...sample[templateId][useLong ? 'long' : 'short'] };
      if (templateId === 'preacher-lower-third') {
        values.variantId = document.getElementById('l3variant').value;
      }
      if (paramVariant) {
        values.variantId = paramVariant;
      }

      // Dynamic date/time tokens (announcement) — /output resolves these live.
      if (document.getElementById('dynamic').checked && templateId === 'announcement-banner') {
        values.dateTime = '{{weekday}} · {{time}}';
        values.callToAction = 'Today is {{date}}';
      }

      const now = new Date().toISOString();
      const theme = {};
      const accent = document.getElementById('accent').value;
      if (accent) theme.accent2Color = accent; // exercises theme-aware keylines

      const size = document.getElementById('size').value;
      const layout = size ? { size } : {};

      const instance = {
        id: 'seed-' + Date.now(),
        templateId,
        values,
        theme,                // empty → /output falls back to the registry theme
        layout,
        durationSeconds: 0,
        createdAt: now,
        updatedAt: now
      };
      // Per-instance override exercises the wired animation path: 'fade' picks
      // the flat crossfade variant, otherwise the registry default (slide build)
      // applies. Full in/out so it survives strict validation everywhere.
      if (document.getElementById('fade').checked) {
        instance.animationOverride = { in: 'fade', out: 'fade' };
      }
      const msg = { id: 'msg-' + Date.now(), type: 'SHOW_GRAPHIC', payload: instance, timestamp: Date.now() };
      localStorage.setItem('livelayer:lastMessage', JSON.stringify(msg));
      channel.postMessage(msg);
      markActive(templateId);
    }

    function clear() {
      stopCycle();
      const msg = { id: 'msg-' + Date.now(), type: 'CLEAR_ALL', payload: {}, timestamp: Date.now() };
      localStorage.removeItem('livelayer:lastMessage');
      channel.postMessage(msg);
      markActive(null);
    }

    function cycleAll() {
      stopCycle();
      let index = 0;
      show(templateIds[index]);
      cycleTimer = setInterval(() => {
        index += 1;
        if (index >= templateIds.length) {
          stopCycle();
          return;
        }
        show(templateIds[index]);
      }, 1800);
    }

    document.querySelectorAll('button[data-t]').forEach((b) =>
      b.addEventListener('click', () => {
        stopCycle();
        show(b.dataset.t);
      }));
    document.querySelector('[data-cycle]').addEventListener('click', cycleAll);
    document.querySelector('[data-clear]').addEventListener('click', clear);
    document.querySelectorAll('button[data-bg]').forEach((b) =>
      b.addEventListener('click', () => {
        document.getElementById('stage').className = 'stage bg-' + b.dataset.bg;
      }));
    document.getElementById('debug').addEventListener('change', (e) => {
      document.getElementById('out').src = '/output' + (e.target.checked ? '?debug=1' : '');
    });

    function applyParams() {
      const params = new URLSearchParams(window.location.search);
      const templateId = params.get('template');
      const variantId = params.get('variant');
      const bg = params.get('bg');
      if (variantId) {
        paramVariant = variantId;
        if (templateId === 'preacher-lower-third') {
          document.getElementById('l3variant').value = variantId;
        }
      }
      if (bg) {
        document.getElementById('stage').className = 'stage bg-' + bg;
      }
      if (params.get('long') === '1') {
        document.getElementById('long').checked = true;
      }
      if (params.get('fade') === '1') {
        document.getElementById('fade').checked = true;
      }
      if (templateId && sample[templateId]) {
        window.setTimeout(() => show(templateId), 150);
      }
    }

    applyParams();
  </script>
</body>
</html>
